name: Build and Release RoYout

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pywebview yt-dlp Pillow pystray pythonnet

    - name: Download FFmpeg
      run: |
        curl -L https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip -o ffmpeg.zip
        Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_temp
        Get-ChildItem -Path ffmpeg_temp -Filter ffmpeg.exe -Recurse | Move-Item -Destination .
        Get-ChildItem -Path ffmpeg_temp -Filter ffprobe.exe -Recurse | Move-Item -Destination .
        Remove-Item ffmpeg.zip
        Remove-Item -Path ffmpeg_temp -Recurse

    - name: Build with PyInstaller
      run: |
        python -m PyInstaller --noconfirm --onedir --windowed --icon="ui/logo.ico" --name="RoYout" --add-data="ui;ui" main.py
        Move-Item -Path dist/RoYout -Destination AppFiles
        Copy-Item -Path ffmpeg.exe -Destination AppFiles/_internal
        Copy-Item -Path ffprobe.exe -Destination AppFiles/_internal

    - name: Verify Build Output
      run: |
        ls AppFiles/
        if (Test-Path "AppFiles/RoYout.exe") {
          Write-Host "Build successful, executable found."
        } else {
          Write-Host "Error: Executable not found in AppFiles!"
          exit 1
        }

    - name: Compile Custom Installer
      run: |
        python -m PyInstaller --noconfirm --onefile --windowed --name="RoYout_Setup" --add-data="AppFiles;AppFiles" installer_script.py
        Move-Item -Path dist/RoYout_Setup.exe -Destination .

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RoYout-Setup
        path: RoYout_Setup.exe

    - name: Create Release
      run: |
        gh release create v1.0 RoYout_Setup.exe --title "RoYout V2 - Version 1.0" --notes "Première version officielle de RoYout. Téléchargez et lancez RoYout_Setup.exe pour installer l'application." || gh release upload v1.0 RoYout_Setup.exe --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
