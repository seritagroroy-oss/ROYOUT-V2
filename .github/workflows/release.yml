name: Build and Release RoYout

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pywebview yt-dlp Pillow pystray pythonnet

    - name: Download FFmpeg
      run: |
        curl -L https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip -o ffmpeg.zip
        Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_temp
        Get-ChildItem -Path ffmpeg_temp -Filter ffmpeg.exe -Recurse | Move-Item -Destination .
        Get-ChildItem -Path ffmpeg_temp -Filter ffprobe.exe -Recurse | Move-Item -Destination .
        Remove-Item ffmpeg.zip
        Remove-Item -Path ffmpeg_temp -Recurse

    - name: Build with PyInstaller
      run: |
        python -m PyInstaller --noconfirm --onedir --windowed --icon="ui/logo.ico" --name="RoYout" --add-data="ui;ui" main.py
        New-Item -ItemType Directory -Path AppFiles
        Copy-Item -Path dist/RoYout/* -Destination AppFiles -Recurse
        Copy-Item -Path ffmpeg.exe -Destination AppFiles
        Copy-Item -Path ffprobe.exe -Destination AppFiles

    - name: Verify Build Output
      run: |
        ls AppFiles/
        if (Test-Path "AppFiles/RoYout.exe") {
          Write-Host "Build successful, executable found."
        } else {
          Write-Host "Error: Executable not found in AppFiles!"
          exit 1
        }

    - name: Compile Installer with NSIS
      run: makensis installer.nsi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RoYout-Setup
        path: RoYout_Setup.exe

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: RoYout_Setup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
