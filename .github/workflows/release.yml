name: Build and Release RoYout

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Version stable pour la compilation

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pywebview yt-dlp Pillow pystray pythonnet==3.1.0rc0

    - name: Download FFmpeg
      run: |
        # Téléchargement de FFmpeg pour Windows (version gyan.dev)
        curl -L https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip -o ffmpeg.zip
        Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_temp
        # Déplacer les fichiers nécessaires à la racine pour PyInstaller
        Get-ChildItem -Path ffmpeg_temp -Filter ffmpeg.exe -Recurse | Move-Item -Destination .
        Get-ChildItem -Path ffmpeg_temp -Filter ffprobe.exe -Recurse | Move-Item -Destination .
        # Nettoyage
        Remove-Item ffmpeg.zip
        Remove-Item -Path ffmpeg_temp -Recurse

    - name: Build with PyInstaller
      run: python package.py

    - name: Compile with Inno Setup
      run: |
        # ISCC.exe est pre-install sur les runners windows de GitHub
        iscc RoYout_Installer.iss

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RoYout-Setup
        path: RoYout_Setup.exe

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: RoYout_Setup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
